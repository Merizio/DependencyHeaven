name: Java CI with Maven

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Repositório
      uses: actions/checkout@v4
      
    - name: Setup do Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
        
    - name: Dar permissão de execução ao mvnw
      run: chmod +x mvnw
      
    - name: Executar os Testes (CI)
      run: ./mvnw test --batch-mode --no-transfer-progress
      
    - name: Empacotar a Aplicação (.jar)
      run: ./mvnw package -DskipTests --batch-mode --no-transfer-progress
      
    - name: Salvar o .jar como Artefato no GitHub
      uses: actions/upload-artifact@v4
      with:
        name: dependancy-heaven-backend
        path: target/*.jar
